<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Music Statistics</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
	<style>
		:root{--card:#111827;--card2:#1a2332;--accent:#3b82f6;--accent-dim:rgba(59,130,246,.15);--text:#e5e7eb;--muted:#9ca3af;--border:#1f2933;--success:#22c55e;--warning:#f59e0b;--danger:#f87171}
		*{box-sizing:border-box;margin:0;padding:0}
		body{font-family:"Inter",sans-serif;background:linear-gradient(135deg,#020617,#0f172a);color:var(--text);display:flex;justify-content:center;padding:40px 16px 80px;min-height:100vh}
		.container{width:100%;max-width:1060px}
		.page-header{text-align:center;margin-bottom:32px}
		.page-header h1{font-size:1.75rem;font-weight:700;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
		.page-header p{color:var(--muted);font-size:.875rem;margin-top:6px}
		.filter-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:20px;display:flex;flex-direction:column;gap:16px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
		.filter-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
		.search-wrapper{position:relative;flex:1;min-width:200px}
		.search-wrapper svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
		#search-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:.9rem;padding:10px 12px 10px 38px;outline:none;transition:border-color .2s,box-shadow .2s}
		#search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
		#search-input::placeholder{color:var(--muted)}
		#artist-select{background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:.9rem;padding:10px 14px;outline:none;cursor:pointer;min-width:180px;transition:border-color .2s}
		#artist-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
		#artist-select option{background:#1a2332}
		.btn-filter{border:1px solid var(--border);padding:9px 18px;border-radius:999px;background:var(--card2);color:var(--text);font-weight:500;font-size:.875rem;cursor:pointer;transition:all .22s;white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:inherit}
		.btn-filter:hover{background:var(--accent);border-color:var(--accent);transform:translateY(-1px)}
		.btn-filter.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 12px rgba(59,130,246,.4)}
		.btn-filter .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);transition:background .2s}
		.btn-filter.active .dot{background:#fff}
		.btn-reset{border:1px solid var(--border);padding:7px 14px;border-radius:8px;background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:all .2s;font-family:inherit}
		.btn-reset:hover{border-color:var(--danger);color:var(--danger)}
		.sliders-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
		.slider-group{display:flex;align-items:center;gap:14px}
		.slider-label{font-size:.85rem;color:var(--muted);white-space:nowrap}
		.slider-label span{color:var(--accent);font-weight:600}
		input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:5px;border-radius:999px;background:var(--border);outline:none;cursor:pointer}
		input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(59,130,246,.5);cursor:pointer;transition:transform .15s}
		input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
		input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--accent);border:none;cursor:pointer}
		.result-bar{display:flex;justify-content:space-between;align-items:center;padding:0 4px;margin-bottom:10px;flex-wrap:wrap;gap:8px}
		#result-count{font-size:.82rem;color:var(--muted)}
		#result-count strong{color:var(--text)}
		.page-size-select{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:inherit;font-size:.8rem;padding:4px 8px;outline:none;cursor:pointer}
		.page-size-select:focus{border-color:var(--accent)}
		.table-card{background:var(--card);border-radius:16px;padding:18px;box-shadow:0 10px 25px rgba(0,0,0,.35);border:1px solid var(--border);overflow-x:auto}
		table{width:100%;border-collapse:collapse}
		th{text-align:left;font-weight:500;color:var(--muted);font-size:.82rem;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;transition:color .2s}
		th:hover{color:var(--text)}
		th.sorted{color:var(--accent)}
		.sort-icon{display:inline-block;margin-left:5px;opacity:.4;font-style:normal;font-size:.75rem;transition:opacity .2s}
		th.sorted .sort-icon{opacity:1}
		td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:.9rem}
		tr:last-child td{border-bottom:none}
		tbody tr{transition:background .15s}
		tbody tr:hover{background:rgba(59,130,246,.05)}
		.badge-recent{display:inline-block;background:rgba(34,197,94,.15);color:var(--success);font-size:.7rem;font-weight:600;padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}
		.perc-cell{font-weight:500}
		.perc-high{color:var(--success)}
		.perc-mid{color:var(--warning)}
		.perc-low{color:var(--danger)}
		.no-results{text-align:center;color:var(--muted);padding:40px 0;font-size:.9rem;display:none}
		.pagination{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:18px}
		.btn-page{border:1px solid var(--border);padding:7px 16px;border-radius:8px;background:var(--card2);color:var(--text);font-size:.85rem;cursor:pointer;transition:all .2s;font-family:inherit}
		.btn-page:hover:not(:disabled){background:var(--accent);border-color:var(--accent)}
		.btn-page:disabled{opacity:.35;cursor:not-allowed}
		#page-info{font-size:.82rem;color:var(--muted);min-width:100px;text-align:center}
		@media(max-width:700px){th:nth-child(3),td:nth-child(3){display:none}.filter-row{flex-direction:column;align-items:stretch}#artist-select{min-width:unset;width:100%}.sliders-row{grid-template-columns:1fr}.nav-bar{flex-wrap:wrap}}
		.nav-bar{display:flex;justify-content:center;gap:8px;margin-bottom:28px}
		.nav-link{padding:10px 22px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:inherit;font-size:.875rem;font-weight:500;text-decoration:none;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:8px}
		.nav-link:hover{border-color:var(--accent);color:var(--text);transform:translateY(-1px)}
		.nav-link.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 18px rgba(59,130,246,.35)}
		.nav-link svg{width:16px;height:16px}
	</style>
</head>
<body>
<div class="container">

	<!-- Navigation -->
	<div class="nav-bar">
		<a class="nav-link active" href="tracks-by-artist.html">
			<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19V6l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg>
			Tracks
		</a>
		<a class="nav-link" href="top-artists.html">
			<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
			Top Artists
		</a>
	</div>

	<div class="page-header">
		<h1>Playback Statistics</h1>
		<p>Detailed analysis of your Spotify listening history</p>
	</div>

	<div class="filter-panel">
		<div class="filter-row">
			<div class="search-wrapper">
				<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
				<input id="search-input" type="text" placeholder="Search artist or track…" />
			</div>
			<select id="artist-select"><option value="">All artists</option></select>
			<button class="btn-filter" id="btn-recent" onclick="toggleFilter('recent')"><span class="dot"></span> Recent</button>
			<button class="btn-filter" id="btn-lowperc" onclick="toggleFilter('lowperc')"><span class="dot"></span> Low %</button>
			<button class="btn-reset" onclick="resetFilters()">↺ Reset</button>
		</div>
		<div class="sliders-row">
			<div class="slider-group">
				<span class="slider-label">Min. percentage: <span id="perc-value">0</span>%</span>
				<input id="perc-slider" type="range" min="0" max="100" value="0" step="5" oninput="onPercSlider(this.value)" />
			</div>
			<div class="slider-group">
				<span class="slider-label">Min. plays: <span id="plays-value">0</span></span>
				<input id="plays-slider" type="range" min="0" max="100" value="0" step="1" oninput="onPlaysSlider(this.value)" />
			</div>
		</div>
	</div>

	<div class="result-bar">
		<span id="result-count">Showing <strong id="count-range">0</strong> of <strong id="count-filtered">0</strong> tracks (<strong id="count-total">0</strong> total)</span>
		<select class="page-size-select" id="page-size-select" onchange="onPageSizeChange(this.value)">
			<option value="50">50 / page</option>
			<option value="100">100 / page</option>
			<option value="250">250 / page</option>
			<option value="9999">All</option>
		</select>
	</div>

	<div class="table-card">
		<table>
			<thead>
				<tr>
					<th onclick="sortBy(0)" id="th-0">Artist <em class="sort-icon">↕</em></th>
					<th onclick="sortBy(1)" id="th-1">Track <em class="sort-icon">↕</em></th>
					<th onclick="sortBy(2)" id="th-2">Plays <em class="sort-icon">↕</em></th>
					<th onclick="sortBy(3)" id="th-3">% <em class="sort-icon">↕</em></th>
				</tr>
			</thead>
			<tbody id="tbody"></tbody>
		</table>
		<div class="no-results" id="no-results">😕 No tracks match the applied filters.</div>
		<div class="pagination">
			<button class="btn-page" id="btn-prev" onclick="changePage(-1)" disabled>← Prev</button>
			<span id="page-info">Page 1 of 1</span>
			<button class="btn-page" id="btn-next" onclick="changePage(1)" disabled>Next →</button>
		</div>
	</div>

</div>
<script>
// ── Data injected by Python ───────────────────────────────────────────────────
const ALL_TRACKS = {{ tracks_json }};
const LOW_PERC_THRESHOLD = {{ limiar_baixo }};

// ── State ─────────────────────────────────────────────────────────────────────
let state = { recent: false, lowperc: false, search: "", artist: "", minPerc: 0, minPlays: 0 };
let filteredData = [];
let currentPage  = 0;
let pageSize     = 50;
let lastSortCol  = -1;
let sortAsc      = true;

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
	// Artist dropdown from data
	const artists = [...new Set(ALL_TRACKS.map(t => t.artist))].sort();
	const sel = document.getElementById("artist-select");
	artists.forEach(a => { const o = document.createElement("option"); o.value = a; o.textContent = a; sel.appendChild(o); });

	// Plays slider max
	const maxPlays = Math.max(0, ...ALL_TRACKS.map(t => t.validPlays));
	document.getElementById("plays-slider").max = maxPlays || 100;

	// Total count
	document.getElementById("count-total").textContent = ALL_TRACKS.length;

	applyFilters();
}

// ── Filtering (operates on JS array, never touches DOM) ───────────────────────
function applyFilters() {
	const q = state.search.toLowerCase();
	filteredData = ALL_TRACKS.filter(t => {
		if (state.recent  && !t.recent)                        return false;
		if (state.lowperc && t.perc >= LOW_PERC_THRESHOLD)     return false;
		if (state.minPerc && t.perc < state.minPerc)           return false;
		if (state.minPlays && t.validPlays < state.minPlays)   return false;
		if (state.artist  && t.artist !== state.artist)        return false;
		if (q && !t.artist.toLowerCase().includes(q) && !t.track.toLowerCase().includes(q)) return false;
		return true;
	});
	applySort();
	currentPage = 0;
	renderPage();
}

// ── Sorting (on filteredData array) ──────────────────────────────────────────
const SORT_KEYS = ["artist", "track", "validPlays", "perc"];
function applySort() {
	if (lastSortCol < 0) return;
	const key = SORT_KEYS[lastSortCol];
	filteredData.sort((a, b) => {
		const va = a[key], vb = b[key];
		return va < vb ? (sortAsc ? -1 : 1) : va > vb ? (sortAsc ? 1 : -1) : 0;
	});
}

function sortBy(col) {
	if (lastSortCol === col) { sortAsc = !sortAsc; }
	else {
		if (lastSortCol >= 0) {
			document.getElementById("th-" + lastSortCol).classList.remove("sorted");
			document.getElementById("th-" + lastSortCol).querySelector(".sort-icon").textContent = "↕";
		}
		sortAsc = true; lastSortCol = col;
	}
	const th = document.getElementById("th-" + col);
	th.classList.add("sorted");
	th.querySelector(".sort-icon").textContent = sortAsc ? "↑" : "↓";
	applySort();
	currentPage = 0;
	renderPage();
}

// ── Render (only current page slice → DocumentFragment) ───────────────────────
function renderPage() {
	const start  = currentPage * pageSize;
	const slice  = filteredData.slice(start, Math.min(start + pageSize, filteredData.length));
	const frag   = document.createDocumentFragment();

	slice.forEach(t => {
		const percClass = t.perc >= 75 ? "perc-high" : t.perc >= LOW_PERC_THRESHOLD ? "perc-mid" : "perc-low";
		const badge     = t.recent ? '<span class="badge-recent">Recent</span>' : "";
		const tr        = document.createElement("tr");
		tr.innerHTML =
			`<td>${t.artist}</td>` +
			`<td>${t.track}${badge}</td>` +
			`<td>${t.validPlays}/${t.totalPlays}</td>` +
			`<td class="perc-cell ${percClass}">${t.perc}%</td>`;
		frag.appendChild(tr);
	});

	const tbody = document.getElementById("tbody");
	tbody.innerHTML = "";
	tbody.appendChild(frag);

	// Update UI counters & pagination
	const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
	const rangeEnd   = Math.min(start + pageSize, filteredData.length);
	const rangeStart = filteredData.length > 0 ? start + 1 : 0;

	document.getElementById("count-range").textContent    = `${rangeStart}–${rangeEnd}`;
	document.getElementById("count-filtered").textContent = filteredData.length;
	document.getElementById("page-info").textContent      = `Page ${currentPage + 1} of ${totalPages}`;
	document.getElementById("btn-prev").disabled          = currentPage === 0;
	document.getElementById("btn-next").disabled          = currentPage >= totalPages - 1;
	document.getElementById("no-results").style.display   = filteredData.length === 0 ? "block" : "none";
}

// ── Pagination ────────────────────────────────────────────────────────────────
function changePage(dir) {
	const totalPages = Math.ceil(filteredData.length / pageSize);
	currentPage = Math.max(0, Math.min(currentPage + dir, totalPages - 1));
	renderPage();
	window.scrollTo({ top: 0, behavior: "smooth" });
}

function onPageSizeChange(val) {
	pageSize    = parseInt(val);
	currentPage = 0;
	renderPage();
}

// ── Toggle buttons ────────────────────────────────────────────────────────────
function toggleFilter(key) {
	state[key] = !state[key];
	document.getElementById("btn-" + key).classList.toggle("active", state[key]);
	if (key === "lowperc" && state.lowperc) {
		state.minPerc = 0;
		document.getElementById("perc-slider").value = 0;
		document.getElementById("perc-value").textContent = 0;
	}
	applyFilters();
}

// ── Sliders ───────────────────────────────────────────────────────────────────
function onPercSlider(v) {
	state.minPerc = parseFloat(v);
	document.getElementById("perc-value").textContent = v;
	if (state.minPerc > 0 && state.lowperc) {
		state.lowperc = false;
		document.getElementById("btn-lowperc").classList.remove("active");
	}
	applyFilters();
}

function onPlaysSlider(v) {
	state.minPlays = parseInt(v);
	document.getElementById("plays-value").textContent = v;
	applyFilters();
}

// ── Search (debounced) ────────────────────────────────────────────────────────
let searchTimer;
document.getElementById("search-input").addEventListener("input", function () {
	clearTimeout(searchTimer);
	searchTimer = setTimeout(() => { state.search = this.value; applyFilters(); }, 200);
});

document.getElementById("artist-select").addEventListener("change", function () {
	state.artist = this.value; applyFilters();
});

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetFilters() {
	state = { recent: false, lowperc: false, search: "", artist: "", minPerc: 0, minPlays: 0 };
	document.getElementById("search-input").value      = "";
	document.getElementById("artist-select").value     = "";
	document.getElementById("perc-slider").value       = 0;
	document.getElementById("perc-value").textContent  = 0;
	document.getElementById("plays-slider").value      = 0;
	document.getElementById("plays-value").textContent = 0;
	document.getElementById("btn-recent").classList.remove("active");
	document.getElementById("btn-lowperc").classList.remove("active");
	if (lastSortCol >= 0) {
		document.getElementById("th-" + lastSortCol).classList.remove("sorted");
		document.getElementById("th-" + lastSortCol).querySelector(".sort-icon").textContent = "↕";
		lastSortCol = -1;
	}
	applyFilters();
}

init();
</script>
</body>
</html>
